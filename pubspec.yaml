name: faithful_journal
description: "A scripture-centered journal designed for thoughtful reflection, prayer, and long-term spiritual remembrance."
version: 1.0.0

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  http: ^1.0.0
  supabase_flutter: '>=1.10.0'
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  go_router: ^14.2.0
  shared_preferences: ^2.0.0
  uuid: ^4.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
