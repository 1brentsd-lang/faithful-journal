name: faithful_journal
description: "Unfold your spiritual journey with a serene digital journal, designed to gently guide your Scripture reflections and preserve your insights for a lifetime of thoughtful remembrance."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  # Deployment stability rules:
  # - Prefer pinned (exact) versions over caret ranges to avoid surprise breakages.
  # - Only upgrade dependencies when explicitly requested.
  # - Prioritize Flutter web build compatibility over newest package features.
  http: 1.2.2
  # Pin Supabase to a stable 2.x line (avoids accidental major upgrades from ">=...").
  supabase_flutter: 2.6.0
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  # Removed google_fonts: it has been a frequent source of web build/CI failures.
  provider: 6.1.2
  # Pin go_router to a widely compatible stable version for Flutter web builds.
  go_router: 14.6.2
  shared_preferences: 2.2.3
  uuid: 4.5.1
  intl: 0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0
  flutter_launcher_icons: 0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
